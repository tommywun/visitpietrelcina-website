jpg?w=1760&amp;ssl=1 1760w" sizes="(max-width: 1814px) 100vw, 1814px" data-attachment-id="1068" data-permalink="https://www.visitpietrelcina.com/rosary-walk/rosary-walk-new-bridge-3/#main" data-orig-file="https://i2.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/06/Rosary-Walk-New-Bridge-3.jpg?fit=1814%2C1361&amp;ssl=1" data-orig-size="1814,1361" data-comments-opened="0" data-image-meta="{&quot;aperture&quot;:&quot;2.2&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;iPhone 6s&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1507137825&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;4.15&quot;,&quot;iso&quot;:&quot;40&quot;,&quot;shutter_speed&quot;:&quot;0.03030303030303&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Rosary Walk New Bridge 3" data-image-description="" data-medium-file="https://i2.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/06/Rosary-Walk-New-Bridge-3.jpg?fit=300%2C225&amp;ssl=1" data-large-file="https://i2.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/06/Rosary-Walk-New-Bridge-3.jpg?fit=880%2C660&amp;ssl=1" /> </a></div><div class="entry-content" itemprop="text"><h2>The Rosary Walk Pietrelcina</h2><p>The Rosary Walk has always been one of our favourite features in Pietrelcina. Firstly let me explain what it is and how it came about.</p><p>Pietrelcina is quite a small town set amidst undulating countryside which surrounds it like a folded blanket of green fields and wooded areas. It is very picturesque but, for a farming community, causes one or two problems. Most villagers owned small parcels of land which were handed down through their families and these were scattered widely about the area.</p><p>The Forgione family owned a small plot of land on the wide, flat plain of Piana Romana (Roman Plain). They had built a small stone room where they stored some of the produce and also slept overnight if they had worked late and did not want to return to the town.&nbsp;</p><p>Since he was a young boy, Francesco would walk along a well worn pathway, through countryside and woodland, with his family members. As they walked, they would recite the rosary. As Francesco grew up, he would follow this 3 km path many, many times, always reciting the rosary as he went.&nbsp;</p><p>This pathway has now been partly paved and the mysteries of the rosary displayed on tiled stands at intervals along the way. This is &#8216;The Rosary Walk&#8217;</p><h5>Retracing Francesco&#8217;s Journey</h5><p style="text-align: center;">Let us take you on that journey, step by step, from the family home to Piana Romana</p><p>We start first at the Forgione home, the birth place of Padre Pio.&nbsp;</p><p><a href="../../../wp-content/uploads/2018/08/Padre-Pio-Home-outside.jpeg" data-elementor-open-lightbox="default"><br /> <img loading="lazy" decoding="async" width="300" height="225" src="https://i2.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/08/Padre-Pio-Home-outside-300x225.jpeg?resize=300%2C225" alt="Entrance of Family Home" srcset="wp-content/uploads/2018/08/Padre-Pio-Home-outside.jpeg 300w, wp-content/uploads/2018/08/Padre-Pio-Home-outside.jpeg 400w" sizes="(max-width: 300px) 100vw, 300px" data-recalc-dims="1"> </a><br /> <a href="../../../wp-content/uploads/2018/08/Padre-Pio-Home-inside2.jpeg" data-elementor-open-lightbox="yes"><br /> <img loading="lazy" decoding="async" width="436" height="314" src="wp-content/uploads/2018/08/Padre-Pio-Home-inside2.jpeg" alt="Inside the family home of Padre Pio" srcset="https://i2.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/08/Padre-Pio-Home-inside2.jpeg?w=436 436w, https://i2.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/08/Padre-Pio-Home-inside2.jpeg?resize=300%2C216 300w" sizes="(max-width: 436px) 100vw, 436px" data-recalc-dims="1"> </a></p><p>On this same street he lived in later life as a Franciscan Friar and Priest for six years.</p><p>The Castello region is the highest point in Pietrelcina Town so he would at first walk down the winding slopes and turn the corner down towards the countryside.</p><p><img loading="lazy" decoding="async" width="248" height="300" src="https://i2.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/08/Castello-Leaving-His-house-248x300.jpg?resize=248%2C300" alt="Street where Padre Pio Lived" srcset="https://i2.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/08/Castello-Leaving-His-house.jpg?resize=248%2C300 248w, https://i2.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/08/Castello-Leaving-His-house.jpg?resize=768%2C929 768w, https://i2.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/08/Castello-Leaving-His-house.jpg?resize=847%2C1024 847w, https://i2.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/08/Castello-Leaving-His-house.jpg?w=1227 1227w" sizes="(max-width: 248px) 100vw, 248px" data-recalc-dims="1"><br /> <img loading="lazy" decoding="async" width="256" height="300" src="https://i1.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/06/Castello-turning-into-steps2-256x300.jpg?resize=256%2C300" alt="Steps down from Castello" srcset="https://i2.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/06/Castello-turning-into-steps2.jpg?resize=256%2C300 256w, https://i2.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/06/Castello-turning-into-steps2.jpg?w=768 768w" sizes="(max-width: 256px) 100vw, 256px" data-recalc-dims="1"></p><p>Going down more steps, he would pass by the oldest well in the village.</p><p><img loading="lazy" decoding="async" src="wp-content/uploads/2018/08/Pietrelcina-Town-Well-4--300x225.jpg" alt="The Town Well" width="122" height="92"  data-recalc-dims="1">In fact, at one time, this well was the sole source of water for the whole town.</p><p><a href="../../../wp-content/uploads/2018/08/Rosary-Steps-going-up-3.jpg" data-elementor-open-lightbox="default"><br /> <img loading="lazy" decoding="async" width="300" height="225" src="https://i1.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Steps-going-up-3-300x225.jpg?resize=300%2C225" alt="Steps down to the well" srcset="wp-content/uploads/2018/08/Rosary-Steps-going-up-3.jpg 300w, wp-content/uploads/2018/08/Rosary-Steps-going-up-3.jpg 768w, wp-content/uploads/2018/08/Rosary-Steps-going-up-3.jpg 1024w, wp-content/uploads/2018/08/Rosary-Steps-going-up-3.jpg 1451w" sizes="(max-width: 300px) 100vw, 300px" data-recalc-dims="1"> </a><br /> <a href="../../../wp-content/uploads/2018/08/Pietrelcina-Town-Well-1.jpg" data-elementor-open-lightbox="default"><br /> <img loading="lazy" decoding="async" width="300" height="225" src="wp-content/uploads/2018/08/Pietrelcina-Town-Well-1-300x225.jpg" alt="The Road past the Well" srcset="wp-content/uploads/2018/08/Pietrelcina-Town-Well-1.jpg 300w, wp-content/uploads/2018/08/Pietrelcina-Town-Well-1.jpg 768w, wp-content/uploads/2018/08/Pietrelcina-Town-Well-1.jpg 1024w, wp-content/uploads/2018/08/Pietrelcina-Town-Well-1.jpg 1270w" sizes="(max-width: 300px) 100vw, 300px" data-recalc-dims="1"> </a></p><p>This is the official start of the Rosary Walk which is marked by two large stones on either side of steps descending down to the first bridge and the start of the path he and his family would take through open countryside and woods.&nbsp;</p><p>I assume the steps would have been much rougher in his days but now they are beautifully paved and have a viewing terrace half way down.&nbsp;</p><p>The bridge at the bottom was damaged by the flood of October 20014 but has been repaired since.</p><p><img loading="lazy" decoding="async" width="300" height="225" src="https://i1.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/08/Start-of-Rosary-Walk-Pietrelcina-300x225.jpg?resize=300%2C225" alt="Start of the Rosary Walk" srcset="wp-content/uploads/2018/08/Start-of-Rosary-Walk-Pietrelcina.jpg 300w, wp-content/uploads/2018/08/Start-of-Rosary-Walk-Pietrelcina.jpg 768w, wp-content/uploads/2018/08/Start-of-Rosary-Walk-Pietrelcina.jpg 1024w, wp-content/uploads/2018/08/Start-of-Rosary-Walk-Pietrelcina.jpg 1451w" sizes="(max-width: 300px) 100vw, 300px" data-recalc-dims="1"><br /> <img loading="lazy" decoding="async" width="300" height="225" src="https://i2.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/06/Rosary-Walk-Stairs-down-david-300x225.jpg?resize=300%2C225" alt="Reaching the Rosary path" srcset="https://i2.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/06/Rosary-Walk-Stairs-down-david.jpg?resize=300%2C225 300w, https://i2.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/06/Rosary-Walk-Stairs-down-david.jpg?resize=768%2C576 768w, https://i2.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/06/Rosary-Walk-Stairs-down-david.jpg?resize=1024%2C768 1024w, https://i2.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/06/Rosary-Walk-Stairs-down-david.jpg?w=1600 1600w" sizes="(max-width: 300px) 100vw, 300px" data-recalc-dims="1"></p><h5>The path through countryside and woods</h5><p><a href="https://i1.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-path-1.jpg" border="0" itemprop="url"><meta itemprop="width" content="797"><meta itemprop="height" content="598"> <img loading="lazy" decoding="async" data-attachment-id="1117" data-orig-file="https://www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-path-1.jpg" data-orig-size="1451,1089" data-comments-opened="" data-image-meta="{&quot;aperture&quot;:&quot;2.2&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;iPhone 6s&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1534939759&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;4.15&quot;,&quot;iso&quot;:&quot;25&quot;,&quot;shutter_speed&quot;:&quot;0.00072780203784571&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Rosary Walk path 1" data-image-description="" data-medium-file="https://www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-path-1-300x225.jpg" data-large-file="https://www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-path-1-1024x769.jpg" src="https://i1.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-path-1.jpg?w=797&amp;h=598" width="797" height="598" data-original-width="797" data-original-height="598" itemprop="http://schema.org/image" title="Rosary Walk path 1" alt="Start of the Rosary Pathway" style="width: 797px; height: 598px;"> </a> Start of the path <a href="https://i1.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-path-2.jpg" border="0" itemprop="url"><meta itemprop="width" content="395"><meta itemprop="height" content="297"> <img loading="lazy" decoding="async" data-attachment-id="1118" data-orig-file="https://www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-path-2.jpg" data-orig-size="1451,1089" data-comments-opened="" data-image-meta="{&quot;aperture&quot;:&quot;2.2&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;iPhone 6s&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1534939780&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;4.15&quot;,&quot;iso&quot;:&quot;25&quot;,&quot;shutter_speed&quot;:&quot;0.00094876660341556&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Rosary Walk path 2" data-image-description="" data-medium-file="https://www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-path-2-300x225.jpg" data-large-file="https://www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-path-2-1024x769.jpg" src="https://i1.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-path-2.jpg?w=395&amp;h=297" width="395" height="297" data-original-width="395" data-original-height="297" itemprop="http://schema.org/image" title="Rosary Walk path 2" alt="Path Continuing on" st -entering-woods-1024x768.jpg" src="https://i1.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-entering-woods.jpg?w=560&amp;h=420" width="560" height="420" data-original-width="560" data-original-height="420" itemprop="http://schema.org/image" title="Rosary Walk entering woods" alt="Nearing the top" style="width: 560px; height: 420px;"> </a> Nearing the top <a href="wp-content/uploads/2018/08/Rosary-Walk-going-through-woods.jpg" border="0" itemprop="url"><meta itemprop="width" content="632"><meta itemprop="height" content="843"> <img loading="lazy" decoding="async" data-attachment-id="1110" data-orig-file="https://www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-going-through-woods.jpg" data-orig-size="1200,1600" data-comments-opened="" data-image-meta="{&quot;aperture&quot;:&quot;2.8&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;iPhone 3G&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1283161939&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Rosary Walk going through woods" data-image-description="" data-medium-file="https://www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-going-through-woods-225x300.jpg" data-large-file="https://www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-going-through-woods-768x1024.jpg" src="wp-content/uploads/2018/08/Rosary-Walk-going-through-woods.jpg" width="632" height="843" data-original-width="632" data-original-height="843" itemprop="http://schema.org/image" title="Rosary Walk going through woods" alt="Onwards through woods" style="width: 632px; height: 843px;"> </a> Onwards through woods <a href="https://i1.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-side-view-2.jpg" border="0" itemprop="url"><meta itemprop="width" content="396"><meta itemprop="height" content="297"> <img loading="lazy" decoding="async" data-attachment-id="1126" data-orig-file="https://www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-side-view-2.jpg" data-orig-size="1024,768" data-comments-opened="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Rosary Walk side view 2" data-image-description="" data-medium-file="https://www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-side-view-2-300x225.jpg" data-large-file="https://www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-side-view-2-1024x768.jpg" src="https://i1.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-side-view-2.jpg?w=396&amp;h=297" width="396" height="297" data-original-width="396" data-original-height="297" itemprop="http://schema.org/image" title="Rosary Walk side view 2" alt="Looking through trees" style="width: 396px; height: 297px;"> </a> Looking through trees <a href="https://i2.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-New-Bridge-3.jpg" border="0" itemprop="url"><meta itemprop="width" content="396"><meta itemprop="height" content="297"> <img loading="lazy" decoding="async" data-attachment-id="1113" data-orig-file="https://www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-New-Bridge-3.jpg" data-orig-size="1633,1225" data-comments-opened="" data-image-meta="{&quot;aperture&quot;:&quot;2.2&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;iPhone 6s&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1507137825&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;4.15&quot;,&quot;iso&quot;:&quot;40&quot;,&quot;shutter_speed&quot;:&quot;0.03030303030303&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Rosary Walk New Bridge 3" data-image-description="" data-medium-file="https://www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-New-Bridge-3-300x225.jpg" data-large-file="https://www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-New-Bridge-3-1024x768.jpg" src="https://i2.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-New-Bridge-3.jpg?w=396&amp;h=297" width="396" height="297" data-original-width="396" data-original-height="297" itemprop="http://schema.org/image" title="Rosary Walk New Bridge 3" alt="Rosary Walk approaching bridge" style="width: 396px; height: 297px;"> </a> Nearing the Bridge <a href="https://i2.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-New-Bridge-5.jpg" border="0" itemprop="url"><meta itemprop="width" content="396"><meta itemprop="height" content="297"> <img loading="lazy" decoding="async" data-attachment-id="1114" data-orig-file="https://www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-New-Bridge-5.jpg" data-orig-size="1633,1225" data-comments-opened="" data-image-meta="{&quot;aperture&quot;:&quot;2.2&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;iPhone 6s&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1507137894&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;4.15&quot;,&quot;iso&quot;:&quot;32&quot;,&quot;shutter_speed&quot;:&quot;0.01&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Rosary Walk New Bridge 5" data-image-description="" data-medium-file="https://www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-New-Bridge-5-300x225.jpg" data-large-file="https://www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-New-Bridge-5-1024x768.jpg" src="https://i2.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/08/Rosary-Walk-New-Bridge-5.jpg?w=396&amp;h=297" width="396" height="297" data-original-width="396" data-original-height="297" itemprop="http://schema.org/image" title="Rosary Walk New Bridge 5" alt="Rosary Walk approaching bridge" style="width: 396px; height: 297px;"> </a> The new bridge</p><p>Walking from the town to the bridge is the less difficult part of the walk and we did it very often, stopping there to say our rosary before turning back to town. It would take us about 20 to 30 minutes to reach the bridge as we did not hurry or make any great effort but took the one hill at a leisurely pace.</p><p>This bridge has a special significance in the story of Padre Pio. The following account is well known in Pietrelcina:</p><blockquote><p>Every day, after he had said Mass, he walked to Piana Romana. On his way he recited the breviary or the Rosary. He greeted and answered courteously all those he met. One day, on the little bridge he had to cross, he beheld the devil in horrible form waiting there in a threatening attitude to attack him and throw him into the ravine. Padre Pio hesitated fearfully for a moment, but soon pulled himself together, made the sign of the cross and put the devil to flight. Piana Romana was Padre Pio’s favourite spot where he gave himself up to prayer and meditation and where he began to suffer the pain of the invisible stigmata…..&nbsp; (from&nbsp;<a href="http://http://padrepiodevotions.org/pray-hope-and-dont-worry-issue-33-october-december-2007/" target="_blank" rel="noopener noreferrer">Pray, Hope &amp; Don&#8217;t Worry</a>&nbsp;&#8211; Issue 33)</p></blockquote><p>Once you cross the bridge, the climb gets much steeper and the ground is rougher. You need a pair of good walking shoes and perhaps a stout stick to continue for the next 100 meters.&nbsp;</p><p>To continue to the second part of the walk:&nbsp;<strong><a href="https://www.visitpietrelcina.com/2018/08/24/rosary-walk-2/">click here</a>.&nbsp;</strong></p><p>Or you can first read about&nbsp;<a href="https://www.visitpietrelcina.com/2018/08/24/rosary-walk-bridge/ ‎" target="_blank" rel="noopener noreferrer">what happened to the old bridge</a>&nbsp;and then continue on the rest of the walk</p></div><footer class="entry-meta" aria-label="Entry meta"> <span class="cat-links"><span class="screen-reader-text">Categories </span><a href="../../../category/rosarywalk/index.html" rel="category tag">Rosary Walk</a></span> <span class="tags-links"><span class="screen-reader-text">Tags </span><a href="../../../tag/pietrelcina/index.html" rel="tag">Pietrelcina</a>, <a href="../../../tag/walks/index.html" rel="tag">Walks</a>, <a href="../../../tag/rosary/index.html" rel="tag">Rosary</a></span></footer></div></article><article id="post-406" class="post-406 post type-post status-publish format-standard has-post-thumbnail hentry category-pietrelcina-town tag-videos tag-towns" itemtype="https://schema.org/CreativeWork" itemscope><div class="inside-article"><header class="entry-header"><h2 class="entry-title" itemprop="headline"><a href="../../../riella-region/index.html" rel="bookmark">Exploring the Riella Region</a></h2></header><div class="post-image"> <a href="../../../riella-region/index.html"> <img width="1814" height="1355" src="https://i1.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/06/Via-Riella2.jpg?fit=1814%2C1355&amp;ssl=1" class="attachment-full size-full wp-post-image" alt="Houses in Via Riella" itemprop="image" decoding="async" loading="lazy" srcset="https://i1.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/06/Via-Riella2.jpg?w=1814&amp;ssl=1 1814w, https://i1.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/06/Via-Riella2.jpg?resize=300%2C224&amp;ssl=1 300w, https://i1.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/06/Via-Riella2.jpg?resize=768%2C574&amp;ssl=1 768w, https://i1.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/06/Via-Riella2.jpg?resize=1024%2C765&amp;ssl=1 1024w, https://i1.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/06/Via-Riella2.jpg?w=1760&amp;ssl=1 1760w" sizes="(max-width: 1814px) 100vw, 1814px" data-attachment-id="965" data-permalink="https://www.visitpietrelcina.com/riella-region/via-riella2/#main" data-orig-file="https://i1.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/06/Via-Riella2.jpg?fit=1814%2C1355&amp;ssl=1" data-orig-size="1814,1355" data-comments-opened="0" data-image-meta="{&quot;aperture&quot;:&quot;2.4&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;iPad mini&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1402409981&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;3.3&quot;,&quot;iso&quot;:&quot;32&quot;,&quot;shutter_speed&quot;:&quot;0.0013477088948787&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Via Riella2" data-image-description="" data-medium-file="https://i1.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/06/Via-Riella2.jpg?fit=300%2C224&amp;ssl=1" data-large-file="https://i1.wp.com/www.visitpietrelcina.com/wp-content/uploads/2018/06/Via-Riella2.jpg?fit=880%2C657&amp;ssl=1" /> </a></div><div class="entry-content" itemprop="text"><p><span class="embed-youtube" style="text-align:center; display: block;"><iframe class='youtube-player' width='880' height='495' src='https://www.youtube.com/embed/VqINYOBlBxU?version=3&#038;rel=1&#038;showsearch=0&#038;showinfo=1&#038;iv_load_policy=1&#038;fs=1&#038;hl=en-GB&#038;autohide=2&#038;start=1&#038;wmode=transparent' allowfullscreen='true' style='border:0;' sandbox='allow-scripts allow-same-origin allow-popups allow-presentation'></iframe></span></p><p>Riella &#8211; Pietrelcina Relaxing</p><p>This route takes us firstly to Riella, the area which joins on to the Castello and is one of the older parts of Pietrelcina.</p><p>Down this road is the convent of the Franciscan Sisters of The Immaculate who help to look after the Parish Church.</p><p>This video also looks at the various restaurants and houses in this area and then moves back up to the main square, turning once again and going down ‘Corso Di Padre Pio’</p><p>It is this street that is used for the stalls and attractions which are set up for the annual festa of Our Lady of Liberty which takes place at the beginning of August.</p><p>The video finishes at a popular meeting place next to the main square.</p></div><footer class="entry-meta" aria-label="Entry meta"> <span class="cat-links"><span class="screen-reader-text">Categories </span><a href="../../../category/pietrelcina-town/index.html" rel="category tag">Pietrelcina</a></span> <span class="tags-links"><span class="screen-reader-text">Tags </span><a href="../../../tag/videos/index.html" rel="tag">Videos</a>, <a href="../../../tag/towns/index.html" rel="tag">Towns</a></span></footer></div></article><nav id="nav-below" class="paging-navigation" aria-label="Archive Page"><div class="nav-previous"> <span class="prev" title="Previous"><a href="../4/index.html" >Older posts</a></span></div><div class="nav-next"> <span class="next" title="Next"><a href="../2/index.html" >Newer posts</a></span></div><div class="nav-links"><a class="prev page-numbers" href="../2/index.html"><span aria-hidden="true">&larr;</span> Previous</a> <a class="page-numbers" href="../../index.html"><span class="screen-reader-text">Page</span>1</a> <a class="page-numbers" href="../2/index.html"><span class="screen-reader-text">Page</span>2</a> <span aria-current="page" class="page-numbers current"><span class="screen-reader-text">Page</span>3</span> <a class="page-numbers" href="../4/index.html"><span class="screen-reader-text">Page</span>4</a> <a class="page-numbers" href="../5/index.html"><span class="screen-reader-text">Page</span>5</a> <a class="next page-numbers" href="../4/index.html">Next <span
